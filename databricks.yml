bundle:
  name: pipeline-commercial

targets:
  dev:
    mode: development
    workspace:
      host: https://adb-7405618938325203.3.azuredatabricks.net
    resources:
      jobs:
        pipeline_commercial_medallion:
          name: "[DEV] pipeline-commercial-medallion"

  prod:
    mode: production
    workspace:
      host: https://adb-7405618938325203.3.azuredatabricks.net
    resources:
      jobs:
        pipeline_commercial_medallion:
          name: "[PROD] pipeline-commercial-medallion"

resources:
  jobs:
    pipeline_commercial_medallion:
      job_clusters:
        - job_cluster_key: shared_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 2

      tasks:
        - task_key: ingestion_bronze
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./01_bronze_ingestion.sql

        - task_key: transformations_silver
          depends_on: [{task_key: ingestion_bronze}]
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./02_silver_transform.py

        - task_key: pipeline_api
          depends_on: [{task_key: ingestion_bronze}]
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./03_api_pipeline.py

        - task_key: gold_build
          depends_on:
            - {task_key: transformations_silver}
            - {task_key: pipeline_api}
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./04_gold_dimensions_facts.py

        - task_key: data_quality_tests
          depends_on: [{task_key: gold_build}]
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./06_data_quality_tests.py